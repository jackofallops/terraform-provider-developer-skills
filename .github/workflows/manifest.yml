name: Manifest Validator
on:
  push:
    branches:
      - main
    paths:
      - 'apm.yml'
      - 'skills/**'
  pull_request:
    paths:
      - 'apm.yml'
      - 'skills/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v4
      - name: Validate apm.yml capabilities
        run: ./scripts/validate-manifest.sh

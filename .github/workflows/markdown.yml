name: Markdown Lint
on:
  push:
    branches:
      - main
    paths:
      - '**/*.md'
      - '.markdownlint.yaml'
  pull_request:
    paths:
      - '**/*.md'
      - '.markdownlint.yaml'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v4
      - uses: DavidAnson/markdownlint-cli2-action@6b51ade7a9e4a75a7ad929842dd298a3804ebe8b # v16
